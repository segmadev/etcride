name: etc_ride_customer
description: ETC Logistics — Customer App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ────────────────────────────────────────────────────────────────
  go_router: ^14.6.3

  # ── Networking ────────────────────────────────────────────────────────────────
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # ── Secure local storage ──────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4

  # ── Maps & location ───────────────────────────────────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # ── Audio ─────────────────────────────────────────────────────────────────────
  audioplayers: ^6.1.0

  # ── Assets ────────────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # ── Phone / OTP ───────────────────────────────────────────────────────────────
  intl_phone_field: ^3.2.0
  pinput: ^5.0.0

  # ── Utilities ─────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  web: ^1.1.1

  # ── Data serialisation ────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/onboarding/
    - assets/cards/
    - assets/icons/
    - assets/icons/Nigeria.svg
    - assets/icons/hugeicons_menu-03.svg
    - assets/icons/map-pin.svg
    - assets/icons/no-trip.svg
    - assets/icons/world-location.svg
    - assets/icons/car.svg
    - assets/icons/courier.svg
    - assets/icons/car-icon.svg
    - assets/icons/motorbike-icon.svg
    - assets/auth/
    - assets/logos/
    - assets/logos/flutterwave-icon 1.svg
    - assets/splash/
    - assets/sounds/
